<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBI Quality — Отчёт</title>
    <meta name="theme-color" content="#1c2b39">

    <script src="./libs/supabase-js.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #f1f5f9;
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        #status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 24px;
            max-width: 460px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #1c2b39;
            margin-bottom: 8px;
        }

        .text {
            font-size: 13px;
            line-height: 1.5;
            color: #64748b;
            font-weight: 700;
        }

        #report-root {
            background: white;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        .report-viewer {
            max-width: 1180px;
            margin: 0 auto;
            background: #ffffff;
        }

        .report-viewer img {
            max-width: 100%;
            height: auto;
            cursor: zoom-in;
        }

        .report-viewer table {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            #report-root {
                padding: 8px;
                overflow-x: hidden;
            }

            .report-viewer {
                width: 100%;
                max-width: 100%;
                overflow-x: hidden;
            }

            .report-viewer table,
            .report-viewer tbody,
            .report-viewer tr,
            .report-viewer td,
            .report-viewer th {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .report-viewer td,
            .report-viewer th {
                padding-left: 0 !important;
                padding-right: 0 !important;
                margin-bottom: 10px !important;
            }

            .report-viewer div {
                max-width: 100% !important;
                box-sizing: border-box !important;
            }

            .report-viewer img {
                max-width: 100% !important;
                cursor: zoom-in;
            }

            .report-viewer img.report-photo-fixed {
                width: auto !important;
                max-width: 100% !important;
                height: auto !important;
                max-height: 240px !important;
                object-fit: contain !important;
                display: block !important;
                margin: 0 auto !important;
                border-radius: 10px !important;
                background: #f8fafc !important;
                cursor: zoom-in !important;
            }

            .report-viewer .report-photo-fixed-box {
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                overflow: visible !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                padding: 6px !important;
                background: #f8fafc !important;
            }

            .report-viewer .report-photo-fixed-card {
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                overflow: visible !important;
            }

            .report-viewer .report-photo-fixed-caption {
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                overflow: visible !important;
            }
        }

        @media print {
            body {
                background: white;
            }

            #report-root {
                padding: 0;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="status">
        <div class="box">
            <div class="title">RBI Quality</div>
            <div class="text">Загрузка отчёта...</div>
        </div>
    </div>

    <div id="report-root" style="display:none;"></div>

    <script>
        const APP_CONFIG = {
            SUPABASE_URL: 'https://api.rbi-q.ru',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc3NTA3MjAwLCJleHAiOjE5MzUyNzM2MDB9.f2s_pInfJu74ptaavpJx7J3I6Arwavcjnkzl1z39wPk'
        };

        function showStatus(title, text) {
            document.getElementById('status').style.display = 'flex';
            document.getElementById('report-root').style.display = 'none';
            document.getElementById('status').innerHTML = `
                <div class="box">
                    <div class="title">${title}</div>
                    <div class="text">${text}</div>
                </div>
            `;
        }
        function enableImageViewer(root) {
            if (!root) return;

            let overlay = document.getElementById('image-viewer-overlay');

            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'image-viewer-overlay';
                overlay.style.cssText = `
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.94);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            cursor: zoom-out;
        `;

                overlay.innerHTML = `
            <img id="image-viewer-img" src="" style="
                max-width: 100%;
                max-height: 92vh;
                width: auto;
                height: auto;
                object-fit: contain;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,.45);
                background: white;
            ">
        `;

                overlay.addEventListener('click', () => {
                    overlay.style.display = 'none';
                    document.getElementById('image-viewer-img').src = '';
                    document.body.style.overflow = '';
                });

                document.body.appendChild(overlay);
            }

            function isQrOrLogo(img) {
                const style = String(img.getAttribute('style') || '').toLowerCase();
                const src = String(img.getAttribute('src') || '').toLowerCase();
                const alt = String(img.getAttribute('alt') || '').toLowerCase();

                if (alt.includes('logo') || alt.includes('qr')) return true;
                if (src.includes('logo') || src.includes('favicon') || src.includes('icon-')) return true;

                const smallSquare =
                    /width\s*:\s*(45|50|55|60|65|70|75)px/.test(style) &&
                    /height\s*:\s*(45|50|55|60|65|70|75)px/.test(style);

                return smallSquare;
            }

            function fixReportPhoto(img) {
                if (!img || isQrOrLogo(img)) return;

                img.classList.add('report-photo-fixed');

                img.style.setProperty('width', 'auto', 'important');
                img.style.setProperty('max-width', '100%', 'important');
                img.style.setProperty('height', 'auto', 'important');
                img.style.setProperty('max-height', '240px', 'important');
                img.style.setProperty('object-fit', 'contain', 'important');
                img.style.setProperty('display', 'block', 'important');
                img.style.setProperty('margin', '0 auto', 'important');
                img.style.setProperty('cursor', 'zoom-in', 'important');
                img.style.setProperty('border-radius', '10px', 'important');
                img.style.setProperty('background', '#f8fafc', 'important');

                let el = img.parentElement;
                let depth = 0;

                while (el && el !== root && depth < 5) {
                    el.style.setProperty('height', 'auto', 'important');
                    el.style.setProperty('min-height', '0', 'important');
                    el.style.setProperty('max-height', 'none', 'important');
                    el.style.setProperty('overflow', 'visible', 'important');
                    el.style.setProperty('box-sizing', 'border-box', 'important');

                    if (depth === 0) {
                        el.classList.add('report-photo-fixed-box');
                        el.style.setProperty('display', 'flex', 'important');
                        el.style.setProperty('align-items', 'center', 'important');
                        el.style.setProperty('justify-content', 'center', 'important');
                        el.style.setProperty('padding', '6px', 'important');
                        el.style.setProperty('background', '#f8fafc', 'important');
                    }

                    if (depth === 1) {
                        el.classList.add('report-photo-fixed-card');
                    }

                    if (depth === 2) {
                        el.classList.add('report-photo-fixed-caption');
                    }

                    el = el.parentElement;
                    depth++;
                }
            }

            function fixAllImages() {
                root.querySelectorAll('img').forEach((img) => {
                    fixReportPhoto(img);

                    if (!img.complete) {
                        img.addEventListener('load', () => fixReportPhoto(img), { once: true });
                    }
                });
            }

            fixAllImages();
            setTimeout(fixAllImages, 300);
            setTimeout(fixAllImages, 1000);

            root.onclick = function (e) {
                const img = e.target && e.target.closest ? e.target.closest('img') : null;
                if (!img) return;
                if (isQrOrLogo(img)) return;

                const src = img.currentSrc || img.getAttribute('src');
                if (!src) return;

                document.getElementById('image-viewer-img').src = src;
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };
        }
        async function loadReport() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || params.get('id');

            if (!token) {
                showStatus('Отчёт не найден', 'В ссылке отсутствует токен отчёта.');
                return;
            }

            try {
                const client = supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_KEY);

                const { data, error } = await client.rpc('get_public_report_by_token', {
                    p_token: token
                });

                if (error) throw error;

                if (!data || data.length === 0) {
                    showStatus('Отчёт недоступен', 'Ссылка недействительна, отчёт удалён или срок доступа истёк.');
                    return;
                }

                const report = data[0];

                document.getElementById('status').style.display = 'none';
                const root = document.getElementById('report-root');
                root.style.display = 'block';
                root.innerHTML = `<div class="report-viewer">${report.html_content}</div>`;
                enableImageViewer(root);
                document.title = 'RBI Quality — Отчёт';

            } catch (e) {
                console.error(e);
                showStatus('Ошибка загрузки', 'Не удалось загрузить отчёт. Проверьте подключение к интернету.');
            }
        }

        loadReport();
    </script>
</body>

</html>
